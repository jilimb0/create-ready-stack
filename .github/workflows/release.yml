name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4

      # No registry-url here — it writes an auth token to .npmrc that
      # overrides OIDC trusted publishing and causes E404.
      - uses: actions/setup-node@v4
        with:
          node-version: 26

      # Upgrade npm — npm natively supports OIDC Trusted Publishing.
      # pnpm has its own token-exchange path that returns 404 for npmjs.com.
      - name: Upgrade npm for trusted publishing
        run: |
          sudo npm i -g npm@11.8.0
          npm -v

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Publish to npm
        run: npm publish --access public --provenance
